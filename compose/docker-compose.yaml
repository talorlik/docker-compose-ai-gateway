# Local AI Microservice Mesh - Docker Compose
# Per PROJECT_PLAN Section 9: anchors, health checks, logging (NFR-024, NFR-026)

volumes:
  model_artifacts:
  ollama_data:

x-env-file-defaults: &env-file-defaults
  env_file:
    - ${PROJECT_ENV_FILE:-../env/.env.dev}

x-common-env: &common-env
  LOG_LEVEL: info
  REQUEST_TIMEOUT: "30"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

x-common-healthcheck: &common-healthcheck
  test:
    - CMD
    - python
    - -c
    - "import sys,urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2); sys.exit(0)"
  interval: 10s
  timeout: 5s
  retries: 3
  start_period: 10s

x-common-logging: &common-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  gateway:
    build:
      context: ../services/gateway
      dockerfile: Dockerfile
    depends_on:
      ai_router:
        condition: service_healthy
      search_service:
        condition: service_healthy
      image_service:
        condition: service_healthy
      ops_service:
        condition: service_healthy
      training-api:
        condition: service_healthy
    environment:
      <<: *common-env
      AI_ROUTER_URL: "http://ai_router:8000"
      SEARCH_SERVICE_URL: "http://search_service:8000"
      IMAGE_SERVICE_URL: "http://image_service:8000"
      OPS_SERVICE_URL: "http://ops_service:8000"
      TRAINING_API_URL: "http://training-api:8000"
      T_ROUTE: "0.60"
      T_MARGIN: "0.10"
    healthcheck:
      <<: *common-healthcheck
    logging:
      <<: *common-logging
    ports:
      - "127.0.0.1:8000:8000"

  ai_router:
    build:
      context: ../services/ai_router
      dockerfile: Dockerfile
    environment:
      <<: *common-env
      MODEL_PATH: /model/model.joblib
    healthcheck:
      <<: *common-healthcheck
    logging:
      <<: *common-logging
    volumes:
      - model_artifacts:/model:ro

  search_service:
    build:
      context: ../services/search_service
      dockerfile: Dockerfile
    environment:
      <<: *common-env
    healthcheck:
      <<: *common-healthcheck
    logging:
      <<: *common-logging

  image_service:
    build:
      context: ../services/image_service
      dockerfile: Dockerfile
    environment:
      <<: *common-env
    healthcheck:
      <<: *common-healthcheck
    logging:
      <<: *common-logging

  ops_service:
    build:
      context: ../services/ops_service
      dockerfile: Dockerfile
    environment:
      <<: *common-env
    healthcheck:
      <<: *common-healthcheck
    logging:
      <<: *common-logging

  trainer:
    build:
      context: ../services/trainer
      dockerfile: Dockerfile
    profiles:
      - train
    volumes:
      - ../services/trainer/train.csv:/train/train.csv:ro
      - model_artifacts:/model
    environment:
      <<: *common-env
    logging:
      <<: *common-logging

  ollama:
    image: ollama/ollama:0.6
    profiles:
      - refine-container
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_MAX_LOADED_MODELS: "${OLLAMA_MAX_LOADED_MODELS:-1}"
      OLLAMA_NUM_PARALLEL: "${OLLAMA_NUM_PARALLEL:-1}"
      OLLAMA_MAX_QUEUE: "${OLLAMA_MAX_QUEUE:-512}"
      OLLAMA_KEEP_ALIVE: "${OLLAMA_KEEP_ALIVE:-30m}"
      OLLAMA_FLASH_ATTENTION: "${OLLAMA_FLASH_ATTENTION:-0}"
      OLLAMA_KV_CACHE_TYPE: "${OLLAMA_KV_CACHE_TYPE:-f16}"
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "ollama serve &
       until ollama list >/dev/null 2>&1; do sleep 1; done &&
       ollama pull ${OLLAMA_MODEL:-phi3:mini} &&
       wait"
    healthcheck:
      test: ["CMD", "sh", "-c", "ollama list | grep -q ${OLLAMA_MODEL:-phi3:mini}"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 600s
    restart: unless-stopped
    logging:
      <<: *common-logging

  refiner:
    build:
      context: ../services/refiner
      dockerfile: Dockerfile
    profiles:
      - refine
    environment:
      <<: *common-env
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-phi3:mini}
    volumes:
      # Shared volume: trainer writes to /model; refiner reads from /data
      - model_artifacts:/data
      # Host mount: train.csv read-only; refiner writes train_candidate.csv
      - ../services/trainer/train.csv:/data/train.csv:ro
    logging:
      <<: *common-logging

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    logging:
      <<: *common-logging

  training-api:
    build:
      context: ../services/training-api
      dockerfile: Dockerfile
    <<: *env-file-defaults
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
    volumes:
      - ../services:/workspace/services:ro
      - ../scripts:/workspace/scripts:ro
      - model_artifacts:/model
      - ../services/trainer:/promote_target
    healthcheck:
      <<: *common-healthcheck
    logging:
      <<: *common-logging
